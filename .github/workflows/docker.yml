name: Build images

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write
  id-token: write # OIDC token for cosign keyless signing (buildx provenance/sbom need no extra perms)

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: infra/docker/api.Dockerfile
            target: runtime
          - name: web
            dockerfile: infra/docker/web.Dockerfile
            target: runner
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # GHCR requires a lowercase image path; owners may have uppercase logins.
      - id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-${{ matrix.name }}" >> "$GITHUB_OUTPUT"
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
      # Build amd64 locally (no push) so the vulnerability gate runs BEFORE
      # anything is published. The layers are cached, so the multi-arch push
      # below reuses them.
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: linux/amd64
          load: true
          tags: ${{ steps.img.outputs.name }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Fail on fixable HIGH/CRITICAL CVEs before publishing. Unfixable
      # base-image CVEs don't block (no action available); accept specific IDs
      # via the checked-in .trivyignore.
      - name: Scan image (gate before publish)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.img.outputs.name }}:scan
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      # Only now build the full multi-arch image and push it, with SLSA build
      # provenance + SBOM attestations baked in by BuildKit.
      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
      - name: Sign the published image (keyless)
        env:
          IMAGE: ${{ steps.img.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
