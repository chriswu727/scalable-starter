name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs opt into more only where they need it.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (format · lint · typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # pnpm version comes from package.json "packageManager", so no version input.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The generated contract types must match the committed OpenAPI spec.
      - name: API contract types are up to date
        run: |
          pnpm --filter @repo/api-contract generate
          git diff --exit-code packages/api-contract/src/generated.ts
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  api:
    name: api (ruff · mypy · pytest · migrations)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt
      - run: pip install -r requirements-dev.txt && pip install --no-deps -e .
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy app
      - run: pytest --maxfail=1 --cov=app --cov-fail-under=70
      # The committed OpenAPI spec must match what the app actually serves.
      - name: OpenAPI spec is up to date
        run: |
          python -c "import json; from app.main import app; print(json.dumps(app.openapi(), indent=2))" > openapi.json
          git diff --exit-code openapi.json
      # The example tests run on SQLite for speed; this exercises the real
      # migrations against Postgres and proves models and migrations agree.
      - name: Migrations apply, round-trip, and match models (Postgres)
        env:
          DATABASE_URL: postgresql+asyncpg://app:app@localhost:5432/app
          REDIS_URL: redis://localhost:6379/0
        run: |
          alembic upgrade head
          alembic check
          alembic downgrade base
          alembic upgrade head

  k8s:
    name: k8s (kustomize · kubeconform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate every overlay against the Kubernetes schemas
        env:
          KUBECONFORM_VERSION: '0.8.0'
        run: |
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz kubeconform
          for o in dev staging prod; do
            echo "== overlay: $o =="
            kubectl kustomize "infra/k8s/overlays/$o" | ./kubeconform -strict -summary
          done
