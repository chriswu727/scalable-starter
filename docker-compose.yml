# =============================================================================
# Local development stack. Mirrors the production topology (web -> api -> db/cache)
# so "works on my machine" matches "works in the cluster".
#   docker compose up --build
# Services are wired by name on a shared network; no host ports needed between them.
# =============================================================================
name: scalable-starter

services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_INTERNAL_URL: http://api:8000
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/.next
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: dev
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/app
      REDIS_URL: redis://redis:6379/0
      LOG_FORMAT: console
    ports:
      - '8000:8000'
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # One-shot: apply DB migrations before the API starts, so a fresh `make up`
  # yields a working /api/v1/items end-to-end. Runs to completion, then exits.
  migrate:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: dev
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/app
    command: ['alembic', 'upgrade', 'head']
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d app']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
