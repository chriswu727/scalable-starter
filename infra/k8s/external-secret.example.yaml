# -----------------------------------------------------------------------------
# TEMPLATE — not wired into any kustomization. For staging/production, provision
# the `app-secrets` Secret from your secret manager instead of committing one.
# This shows the External Secrets Operator (https://external-secrets.io); the
# Sealed Secrets controller is an equally good choice.
#
# Copy into an overlay, set the store + remote keys, and add it to that overlay's
# kustomization `resources`.
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cluster-secret-store # your ClusterSecretStore (AWS SM, GCP SM, Vault, ...)
    kind: ClusterSecretStore
  target:
    name: app-secrets # the Secret the Deployments mount via envFrom
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: scalable-starter/prod/SECRET_KEY
    - secretKey: DATABASE_URL
      remoteRef:
        key: scalable-starter/prod/DATABASE_URL
