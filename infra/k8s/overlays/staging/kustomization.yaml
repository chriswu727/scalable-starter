apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: scalable-starter-staging
resources:
  - ../../base

replicas:
  - name: api
    count: 2
  - name: web
    count: 2
  - name: worker
    count: 1

images:
  - name: app-api
    newName: ghcr.io/your-org/app-api
    newTag: staging
  - name: app-web
    newName: ghcr.io/your-org/app-web
    newTag: staging

patches:
  - path: patch-config.yaml
  - path: patch-ingress.yaml
    target:
      kind: Ingress
      name: app
