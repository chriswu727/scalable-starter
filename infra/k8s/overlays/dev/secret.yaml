# DEV-ONLY secret with throwaway values, so the dev overlay is self-contained.
# Staging/production must NOT ship a plaintext Secret — provision app-secrets via
# External Secrets Operator / Sealed Secrets (see infra/k8s/README.md).
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  # Dev key only — never reuse. The production-safety guard rejects defaults
  # when ENVIRONMENT=production (dev sets ENVIRONMENT=development).
  SECRET_KEY: 'dev-only-secret-key-not-for-production-use-0123456789abcdef'
  DATABASE_URL: 'postgresql+asyncpg://app:app@postgres:5432/app'
