# -----------------------------------------------------------------------------
# TEMPLATE — not wired into any kustomization. Requires cert-manager
# (https://cert-manager.io) installed in the cluster. Apply once per cluster so
# the `cert-manager.io/cluster-issuer` annotation on the Ingress (set by the
# staging/prod overlays) can provision the app-tls certificate automatically.
# -----------------------------------------------------------------------------
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: you@example.com # CHANGE ME
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx # match your ingress controller
