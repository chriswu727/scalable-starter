apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base manifests shared by every environment. Overlays patch replicas, images,
# env, and namespace on top of these.
namespace: scalable-starter

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: scalable-starter
      app.kubernetes.io/managed-by: kustomize

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  # No Secret here on purpose: a plaintext example must not render into staging
  # or prod. The dev overlay ships a throwaway one; staging/prod provision
  # `app-secrets` via External Secrets / Sealed Secrets (see README.md).
  - api-deployment.yaml
  - api-service.yaml
  - api-hpa.yaml
  - api-pdb.yaml
  - web-deployment.yaml
  - web-service.yaml
  - web-hpa.yaml
  - web-pdb.yaml
  - worker-deployment.yaml
  - worker-hpa.yaml
  - worker-pdb.yaml
  - migrate-job.yaml
  - ingress.yaml
  - networkpolicy.yaml
