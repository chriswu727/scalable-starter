# Zero-trust networking: deny all ingress by default, then open only what's
# needed. Adjust the ingress-controller namespace label to match your cluster
# (here we assume the standard `kubernetes.io/metadata.name: ingress-nginx`).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-from-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-from-web-and-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: web
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        # Let a Prometheus/OTel collector in the "monitoring" namespace scrape
        # /metrics; otherwise the zero-trust policy silently blackholes it.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8000
---
# Allow the app tier to reach the datastore. In staging/prod there are no
# postgres/redis pods (managed datastores are external), so this selects nothing.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-datastore-from-app
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: datastore
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backend
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: worker
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: migration
