# Runs database migrations as part of a deploy. With raw kustomize this applies
# on `kubectl apply -k`; for Helm/Argo CD, convert it to a pre-install /
# PreSync hook so it runs before the new app pods roll out. backoffLimit lets it
# retry until the database is reachable (e.g. while the dev datastore starts).
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  labels:
    app.kubernetes.io/name: migrate
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: migrate
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      serviceAccountName: app
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: app-api:latest
          command: ['alembic', 'upgrade', 'head']
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: '1'
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
